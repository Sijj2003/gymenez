<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GYMENEZ - Administración de Métricas</title>
    <link rel="icon" type="image/png" href="mini_logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d0d1a;
            background-image: url('FONDO.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #e5e7eb;
        }
        .glass-effect {
            background-color: rgba(13, 13, 26, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .custom-input {
            background-color: #1a1a2e;
            border: 1px solid #3d3d5c;
            color: #e5e7eb;
            padding: 0.6rem;
            border-radius: 0.5rem;
            width: 100%;
            font-family: monospace;
        }
        .logo-text { text-shadow: -1px -1px 0 #000, 1px 1px 0 #000; }
        .section-title { color: #facc15; font-weight: bold; border-left: 4px solid #facc15; padding-left: 10px; margin-bottom: 15px; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <header class="glass-effect fixed top-0 w-full z-50 px-6 py-3 flex justify-between items-center">
        <h1 class="text-2xl font-extrabold logo-text">
            <span class="text-yellow-400">GYM</span>ENEZ <span class="text-sm font-normal text-gray-400 ml-2">| Registro de Medidas</span>
        </h1>
        <button onclick="window.location.href='administration.html'" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-lg text-sm transition">Volver al Panel</button>
    </header>

    <main class="pt-24 px-4 max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-6">
        
        <div class="lg:col-span-1 glass-effect p-4 rounded-xl h-fit">
            <label class="text-xs text-gray-400 mb-2 block uppercase">Buscar Cliente</label>
            <input type="text" id="user-search" class="custom-input mb-4" placeholder="Nombre o Cédula...">
            <div id="users-list" class="space-y-2 max-h-[60vh] overflow-y-auto pr-2 custom-scroll"></div>
        </div>

        <div class="lg:col-span-3">
            <div id="empty-state" class="glass-effect p-20 rounded-xl text-center border border-dashed border-gray-700">
                <p class="text-gray-500 italic">Selecciona un perfil de la izquierda para gestionar sus medidas físicas.</p>
            </div>

            <form id="metrics-form" class="glass-effect p-8 rounded-xl hidden space-y-8">
                <div class="border-b border-gray-700 pb-4">
                    <h2 id="selected-user-name" class="text-3xl font-bold text-white">---</h2>
                    <p id="selected-user-info" class="text-indigo-400 text-sm">Cargando datos del cliente...</p>
                </div>

                <div>
                    <h3 class="section-title">Rasgos Generales</h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div><label class="text-xs text-gray-400 block mb-1">Estatura</label><input type="text" name="estatura" class="custom-input" placeholder="Ej: 175 cm"></div>
                        <div><label class="text-xs text-gray-400 block mb-1">Peso</label><input type="text" name="peso" class="custom-input" placeholder="Ej: 75.4 kg"></div>
                        <div><label class="text-xs text-gray-400 block mb-1">Edad</label><input type="text" name="age" class="custom-input" placeholder="Ej: 22"></div>
                    </div>
                </div>

                <div>
                    <h3 class="section-title">Medidas Superiores</h3>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div><label class="text-xs text-gray-400 block mb-1">Cuello</label><input type="text" name="cuello" class="custom-input"></div>
                        <div><label class="text-xs text-gray-400 block mb-1">Espalda</label><input type="text" name="espalda" class="custom-input"></div>
                        <div><label class="text-xs text-gray-400 block mb-1">Tórax</label><input type="text" name="torax" class="custom-input"></div>
                        <div><label class="text-xs text-gray-400 block mb-1">Abdomen</label><input type="text" name="abdomen" class="custom-input"></div>
                        <div><label class="text-xs text-gray-400 block mb-1">Brazo Der.</label><input type="text" name="brazo_der" class="custom-input"></div>
                        <div><label class="text-xs text-gray-400 block mb-1">Brazo Izq.</label><input type="text" name="brazo_izq" class="custom-input"></div>
                        <div><label class="text-xs text-gray-400 block mb-1">Antebrazo Der.</label><input type="text" name="antebrazo_der" class="custom-input"></div>
                        <div><label class="text-xs text-gray-400 block mb-1">Antebrazo Izq.</label><input type="text" name="antebrazo_izq" class="custom-input"></div>
                    </div>
                </div>

                <div>
                    <h3 class="section-title">Medidas Inferiores</h3>
                    <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                        <div><label class="text-xs text-gray-400 block mb-1">Cintura</label><input type="text" name="cintura" class="custom-input"></div>
                        <div><label class="text-xs text-gray-400 block mb-1">Fémur Der.</label><input type="text" name="femur_der" class="custom-input"></div>
                        <div><label class="text-xs text-gray-400 block mb-1">Fémur Izq.</label><input type="text" name="femur_izq" class="custom-input"></div>
                        <div><label class="text-xs text-gray-400 block mb-1">Tibia Der.</label><input type="text" name="tibia_der" class="custom-input"></div>
                        <div><label class="text-xs text-gray-400 block mb-1">Tibia Izq.</label><input type="text" name="tibia_izq" class="custom-input"></div>
                    </div>
                </div>

                <div>
                    <h3 class="section-title">Patologías y Observaciones</h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div><label class="text-xs text-gray-400 block mb-1">Alergias</label><textarea name="alergias" rows="2" class="custom-input text-xs"></textarea></div>
                        <div><label class="text-xs text-gray-400 block mb-1">Enfermedades Crónicas</label><textarea name="enfermedades" rows="2" class="custom-input text-xs"></textarea></div>
                        <div><label class="text-xs text-gray-400 block mb-1">Otros</label><textarea name="otros" rows="2" class="custom-input text-xs"></textarea></div>
                    </div>
                </div>

                <button type="submit" class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-black py-4 rounded-xl transition transform hover:scale-[1.01] shadow-2xl uppercase tracking-tighter">
                    Guardar Cambios en el Perfil del Usuario
                </button>
            </form>
        </div>
    </main>

    <script>
        const API_BASE_URL = "https://sijj2003.pythonanywhere.com";
        let allUsers = [];
        let currentUserId = null;

        async function loadUsers() {
            try {
                const res = await fetch(`${API_BASE_URL}/api/admin/users`);
                const data = await res.json();
                if (data.success) {
                    allUsers = data.users;
                    renderUsers(allUsers);
                }
            } catch (err) { console.error("Error cargando usuarios", err); }
        }

        function renderUsers(users) {
            const container = document.getElementById('users-list');
            container.innerHTML = users.map(u => `
                <button onclick="selectUser('${u.id}', '${u.full_name || u.name}', '${u.email}')" class="w-full text-left p-3 rounded-lg hover:bg-yellow-500/10 text-sm border border-transparent hover:border-yellow-500/30 transition group">
                    <span class="font-bold text-white group-hover:text-yellow-400">${u.full_name || u.name}</span>
                    <p class="text-[10px] text-gray-500 uppercase">${u.id_number || 'S/C'}</p>
                </button>
            `).join('');
        }

        async function selectUser(id, name, email) {
            currentUserId = id;
            document.getElementById('empty-state').classList.add('hidden');
            const form = document.getElementById('metrics-form');
            form.classList.remove('hidden');
            document.getElementById('selected-user-name').textContent = name;
            document.getElementById('selected-user-info').textContent = email;
            
            form.reset();
            
            try {
                const res = await fetch(`${API_BASE_URL}/api/metrics/${id}`);
                const data = await res.json();
                if (data.success && data.metrics) {
                    // Mapeo automático de campos según el atributo 'name'
                    Object.keys(data.metrics).forEach(key => {
                        const input = form.querySelector(`[name="${key}"]`);
                        if (input) input.value = data.metrics[key];
                    });
                }
            } catch (err) { console.error("Error al obtener métricas", err); }
        }

        document.getElementById('metrics-form').onsubmit = async (e) => {
            e.preventDefault();
            const formData = Object.fromEntries(new FormData(e.target));
            
            try {
                const res = await fetch(`${API_BASE_URL}/api/metrics/${currentUserId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                
                const result = await res.json();
                if(result.success) {
                    alert("✅ Perfil físico actualizado. El usuario ya puede ver estos datos.");
                } else {
                    alert("❌ Error: " + result.error);
                }
            } catch (err) { alert("Error de conexión"); }
        };

        document.getElementById('user-search').oninput = (e) => {
            const term = e.target.value.toLowerCase();
            renderUsers(allUsers.filter(u => 
                (u.full_name || u.name).toLowerCase().includes(term) || 
                (u.id_number && u.id_number.includes(term))
            ));
        };

        window.onload = loadUsers;
    </script>
</body>
</html>
