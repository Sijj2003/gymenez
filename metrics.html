<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GYMENEZ - Registro de Métricas</title>
    <link rel="icon" type="image/png" href="mini_logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d0d1a;
            background-image: url('FONDO.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #e5e7eb;
        }
        .glass-effect {
            background-color: rgba(13, 13, 26, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .custom-input {
            background-color: #1a1a2e;
            border: 1px solid #3d3d5c;
            color: #e5e7eb;
            padding: 0.6rem;
            border-radius: 0.5rem;
            width: 100%;
        }
        .logo-text { text-shadow: -1px -1px 0 #000, 1px 1px 0 #000; }
        .logo-yellow { color: #facc15; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <header class="glass-effect fixed top-0 w-full z-50 px-6 py-3 flex justify-between items-center">
        <h1 class="text-2xl font-extrabold logo-text">
            <span class="logo-yellow">GYM</span>ENEZ <span class="text-sm font-normal text-gray-400 ml-2">| Control de Medidas</span>
        </h1>
        <button onclick="window.location.href='administration.html'" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-lg text-sm">Volver</button>
    </header>

    <main class="pt-24 px-4 max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-6">
        
        <div class="lg:col-span-1 glass-effect p-4 rounded-xl h-fit">
            <input type="text" id="user-search" class="custom-input mb-4" placeholder="Buscar cliente...">
            <div id="users-list" class="space-y-2 max-h-[60vh] overflow-y-auto pr-2"></div>
        </div>

        <div class="lg:col-span-3">
            <div id="empty-state" class="glass-effect p-20 rounded-xl text-center">
                <p class="text-gray-500 italic">Selecciona un usuario para registrar sus medidas corporales.</p>
            </div>

            <form id="metrics-form" class="glass-effect p-6 rounded-xl hidden">
                <div class="mb-6 border-b border-gray-700 pb-4">
                    <h2 id="selected-user-name" class="text-2xl font-bold text-white">---</h2>
                    <p id="selected-user-id-display" class="text-indigo-400 text-sm">Selecciona un perfil</p>
                </div>

                <h3 class="text-indigo-400 font-bold mb-4 uppercase text-xs tracking-widest">Composición General</h3>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                    <div><label class="block text-xs mb-1">Peso (kg)</label><input type="text" name="peso" class="custom-input"></div>
                    <div><label class="block text-xs mb-1">Estatura (cm)</label><input type="text" name="estatura" class="custom-input"></div>
                    <div><label class="block text-xs mb-1">% Grasa</label><input type="text" name="grasa" class="custom-input"></div>
                    <div><label class="block text-xs mb-1">% Muscular</label><input type="text" name="muscular" class="custom-input"></div>
                </div>

                <h3 class="text-indigo-400 font-bold mb-4 uppercase text-xs tracking-widest">Tren Superior</h3>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-8">
                    <div><label class="block text-xs mb-1">Pecho (cm)</label><input type="text" name="pecho" class="custom-input"></div>
                    <div><label class="block text-xs mb-1">Cintura (cm)</label><input type="text" name="cintura" class="custom-input"></div>
                    <div><label class="block text-xs mb-1">Cuello (cm)</label><input type="text" name="cuello" class="custom-input"></div>
                    <div><label class="block text-xs mb-1">Brazo Izq (cm)</label><input type="text" name="brazo_izquierdo" class="custom-input"></div>
                    <div><label class="block text-xs mb-1">Brazo Der (cm)</label><input type="text" name="brazo_derecho" class="custom-input"></div>
                </div>

                <h3 class="text-indigo-400 font-bold mb-4 uppercase text-xs tracking-widest">Tren Inferior</h3>
                <div class="grid grid-cols-2 md:grid-cols-2 gap-4 mb-8">
                    <div><label class="block text-xs mb-1">Pierna Izq (cm)</label><input type="text" name="pierna_izquierda" class="custom-input"></div>
                    <div><label class="block text-xs mb-1">Pierna Der (cm)</label><input type="text" name="pierna_derecha" class="custom-input"></div>
                </div>

                <h3 class="text-indigo-400 font-bold mb-4 uppercase text-xs tracking-widest">Información Adicional</h3>
                <div class="space-y-4">
                    <div><label class="block text-xs mb-1">Patologías / Observaciones</label>
                    <textarea name="patologias" rows="2" class="custom-input"></textarea></div>
                    <div><label class="block text-xs mb-1">Notas de Progreso</label>
                    <textarea name="notas_progreso" rows="2" class="custom-input"></textarea></div>
                </div>

                <button type="submit" class="w-full mt-8 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg transition shadow-lg">
                    Actualizar Métricas Personalizadas
                </button>
            </form>
        </div>
    </main>

    <script>
        const API_BASE_URL = "https://sijj2003.pythonanywhere.com";
        let allUsers = [];
        let currentUserId = null;

        async function loadUsers() {
            const res = await fetch(`${API_BASE_URL}/api/admin/users`);
            const data = await res.json();
            if (data.success) {
                allUsers = data.users;
                renderUsers(allUsers);
            }
        }

        function renderUsers(users) {
            const container = document.getElementById('users-list');
            container.innerHTML = users.map(u => `
                <button onclick="selectUser('${u.id}', '${u.full_name || u.name}')" class="w-full text-left p-3 rounded-lg hover:bg-indigo-600/30 text-sm border border-transparent hover:border-indigo-500/50 transition">
                    ${u.full_name || u.name} <br> <span class="text-xs text-gray-500">${u.id_number || ''}</span>
                </button>
            `).join('');
        }

        async function selectUser(id, name) {
            currentUserId = id;
            document.getElementById('empty-state').classList.add('hidden');
            const form = document.getElementById('metrics-form');
            form.classList.remove('hidden');
            document.getElementById('selected-user-name').textContent = name;
            document.getElementById('selected-user-id-display').textContent = `ID: ${id}`;
            
            form.reset();
            // Cargar datos actuales desde el endpoint de métricas
            const res = await fetch(`${API_BASE_URL}/api/metrics/${id}`);
            const data = await res.json();
            if (data.success && data.metrics) {
                Object.keys(data.metrics).forEach(key => {
                    const input = form.querySelector(`[name="${key}"]`);
                    if (input) input.value = data.metrics[key];
                });
            }
        }

        document.getElementById('metrics-form').onsubmit = async (e) => {
            e.preventDefault();
            const formData = Object.fromEntries(new FormData(e.target));
            
            const res = await fetch(`${API_BASE_URL}/api/metrics/${currentUserId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });
            
            const result = await res.json();
            alert(result.success ? "Métricas guardadas correctamente" : "Error al guardar");
        };

        document.getElementById('user-search').oninput = (e) => {
            const term = e.target.value.toLowerCase();
            renderUsers(allUsers.filter(u => (u.full_name || u.name).toLowerCase().includes(term)));
        };

        window.onload = loadUsers;
    </script>
</body>
</html>
