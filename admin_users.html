<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GYMENEZ - Gestión de Usuarios</title>
    <link rel="icon" type="image/png" href="mini_logo.png">
    <link rel="shortcut icon" type="image/png" href="mini_logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap');
        
        .GYM-YELLOW { color: #FFC300; }
        .bg-GYM-YELLOW { background-color: #FFC300; }
        .border-GYM-YELLOW { border-color: #FFC300; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d0d1a;
            background-image: url('FONDO.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #e5e7eb;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Estilo para las tablas de métricas dentro del modal */
        .metrics-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 0.5rem;
            color: white;
            width: 100%;
        }
        .metrics-input:focus {
            outline: none;
            border-color: #FFC300;
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div class="flex items-center gap-4">
                <button id="back-btn" class="p-2 hover:bg-white/10 rounded-full transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                </button>
                <h1 class="text-3xl font-black italic tracking-tighter">GESTIÓN DE <span class="GYM-YELLOW">USUARIOS</span></h1>
            </div>
            <button id="add-user-btn" class="bg-GYM-YELLOW text-black font-bold px-6 py-2 rounded-full hover:bg-yellow-500 transition-all flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                NUEVO USUARIO
            </button>
        </div>

        <div class="mb-6">
            <input type="text" id="user-search-input" placeholder="Buscar por nombre, apellido o email..." 
                class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-GYM-YELLOW transition-colors">
        </div>

        <div class="glass-panel rounded-3xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-white/5 text-gray-400 uppercase text-xs font-bold">
                        <tr>
                            <th class="p-4">Usuario</th>
                            <th class="p-4">Email / Cédula</th>
                            <th class="p-4 text-center">Estado</th>
                            <th class="p-4 text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="users-table-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="user-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden flex items-center justify-center z-40 p-4">
        <div class="bg-[#1a1a2e] border border-white/10 w-full max-w-md rounded-2xl p-6">
            <h2 id="modal-title" class="text-2xl font-bold GYM-YELLOW mb-6">NUEVO USUARIO</h2>
            <form id="user-form" class="space-y-4">
                <input type="hidden" id="user-id">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="user-name" placeholder="Nombre" class="w-full bg-white/5 border border-white/10 rounded-lg p-2 text-white" required>
                    <input type="text" id="user-last-name" placeholder="Apellido" class="w-full bg-white/5 border border-white/10 rounded-lg p-2 text-white" required>
                </div>
                <input type="email" id="user-email" placeholder="Correo Electrónico" class="w-full bg-white/5 border border-white/10 rounded-lg p-2 text-white" required>
                <input type="text" id="user-ci" placeholder="Cédula (Ej: 28.123.456)" class="w-full bg-white/5 border border-white/10 rounded-lg p-2 text-white" required>
                <div class="flex gap-4 pt-4">
                    <button type="submit" class="flex-1 bg-GYM-YELLOW text-black font-bold p-3 rounded-xl">GUARDAR</button>
                    <button type="button" id="close-modal-btn" class="px-6 bg-white/10 rounded-xl">CANCELAR</button>
                </div>
            </form>
        </div>
    </div>

    <div id="metrics-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4">
        <div class="bg-[#1a1a2e] border border-white/10 w-full max-w-4xl max-h-[90vh] overflow-y-auto rounded-2xl shadow-2xl">
            <div class="p-6 border-b border-white/10 flex justify-between items-center sticky top-0 bg-[#1a1a2e] z-10">
                <h2 class="text-2xl font-bold GYM-YELLOW">MÉTRICAS CORPORALES</h2>
                <button onclick="closeMetricsModal()" class="text-gray-400 hover:text-white text-2xl">&times;</button>
            </div>
            
            <form id="metrics-form" class="p-6 space-y-8 text-sm">
                <input type="hidden" id="metrics-user-id">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="space-y-6">
                        <section>
                            <h3 class="text-emerald-400 font-bold mb-3 uppercase tracking-wider">1. Rasgos Generales</h3>
                            <div class="grid grid-cols-3 gap-3">
                                <div><label class="text-[10px] text-gray-500 block mb-1">ESTATURA (CM)</label><input type="number" id="field-estatura" class="metrics-input"></div>
                                <div><label class="text-[10px] text-gray-500 block mb-1">PESO (KG)</label><input type="number" step="0.1" id="field-peso" class="metrics-input"></div>
                                <div><label class="text-[10px] text-gray-500 block mb-1">EDAD</label><input type="number" id="field-edad" class="metrics-input"></div>
                            </div>
                        </section>

                        <section>
                            <h3 class="text-emerald-400 font-bold mb-3 uppercase tracking-wider">2. Medidas Superiores</h3>
                            <div class="grid grid-cols-2 gap-3">
                                <div><label class="text-[10px] text-gray-500">CUELLO</label><input type="number" id="field-cuello" class="metrics-input"></div>
                                <div><label class="text-[10px] text-gray-500">ESPALDA</label><input type="number" id="field-espalda" class="metrics-input"></div>
                                <div><label class="text-[10px] text-gray-500">TÓRAX</label><input type="number" id="field-torax" class="metrics-input"></div>
                                <div><label class="text-[10px] text-gray-500">ABDOMEN</label><input type="number" id="field-abdomen" class="metrics-input"></div>
                                <div><label class="text-[10px] text-blue-400">BRAZO DER.</label><input type="number" id="field-brazo_derecho" class="metrics-input"></div>
                                <div><label class="text-[10px] text-blue-400">BRAZO IZQ.</label><input type="number" id="field-brazo_izquierdo" class="metrics-input"></div>
                                <div><label class="text-[10px] text-amber-400">ANTEBRAZO DER.</label><input type="number" id="field-antebrazo_derecho" class="metrics-input"></div>
                                <div><label class="text-[10px] text-amber-400">ANTEBRAZO IZQ.</label><input type="number" id="field-antebrazo_izquierdo" class="metrics-input"></div>
                            </div>
                        </section>
                    </div>

                    <div class="space-y-6">
                        <section>
                            <h3 class="text-emerald-400 font-bold mb-3 uppercase tracking-wider">3. Medidas Inferiores</h3>
                            <div class="grid grid-cols-2 gap-3">
                                <div class="col-span-2"><label class="text-[10px] text-gray-500">CINTURA</label><input type="number" id="field-cintura" class="metrics-input"></div>
                                <div><label class="text-[10px] text-gray-500">FÉMUR DER.</label><input type="number" id="field-femur_derecho" class="metrics-input"></div>
                                <div><label class="text-[10px] text-gray-500">FÉMUR IZQ.</label><input type="number" id="field-femur_izquierdo" class="metrics-input"></div>
                                <div><label class="text-[10px] text-purple-400">TIBIA DER.</label><input type="number" id="field-tibia_derecha" class="metrics-input"></div>
                                <div><label class="text-[10px] text-purple-400">TIBIA IZQ.</label><input type="number" id="field-tibia_izquierda" class="metrics-input"></div>
                            </div>
                        </section>

                        <section>
                            <h3 class="text-red-400 font-bold mb-3 uppercase tracking-wider">4. Salud y Observaciones</h3>
                            <div class="space-y-3">
                                <div><label class="text-[10px] text-gray-500">ALERGIAS</label><textarea id="field-alergias" class="metrics-input h-14 resize-none"></textarea></div>
                                <div><label class="text-[10px] text-gray-500">ENFERMEDADES CRÓNICAS</label><textarea id="field-enfermedades_cronicas" class="metrics-input h-14 resize-none"></textarea></div>
                                <div><label class="text-[10px] text-gray-500">OTROS</label><textarea id="field-otros" class="metrics-input h-14 resize-none"></textarea></div>
                            </div>
                        </section>
                    </div>
                </div>

                <div class="pt-6 flex gap-4">
                    <button type="submit" class="flex-1 bg-GYM-YELLOW text-black font-bold p-4 rounded-2xl hover:scale-[1.02] transition-transform shadow-lg shadow-yellow-500/20">GUARDAR MÉTRICAS</button>
                    <button type="button" onclick="closeMetricsModal()" class="px-8 bg-white/5 border border-white/10 rounded-2xl hover:bg-white/10 transition-colors">CANCELAR</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://127.0.0.1:5000'; // Ajusta esto a tu URL real
        let allUsers = [];

        // --- CARGAR USUARIOS ---
        async function fetchAllUsers() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/users`);
                const data = await response.json();
                if (data.success) {
                    allUsers = data.users;
                    renderUsers(allUsers);
                }
            } catch (error) {
                console.error("Error al cargar usuarios:", error);
            }
        }

        function renderUsers(users) {
            const tableBody = document.getElementById('users-table-body');
            tableBody.innerHTML = '';

            users.forEach(user => {
                const row = document.createElement('tr');
                row.className = 'border-b border-white/5 hover:bg-white/5 transition-colors';
                
                const blockBtnClass = user.is_blocked ? 'bg-emerald-600 hover:bg-emerald-700' : 'bg-amber-600 hover:bg-amber-700';

                row.innerHTML = `
                    <td class="p-4">
                        <div class="font-bold">${user.name} ${user.last_name}</div>
                        <div class="text-xs text-gray-500">ID: ${user.id}</div>
                    </td>
                    <td class="p-4">
                        <div class="text-sm font-mono text-emerald-400">${user.email}</div>
                        <div class="text-xs text-gray-400">CI: ${user.ci || 'N/A'}</div>
                    </td>
                    <td class="p-4 text-center">
                        <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase ${user.is_blocked ? 'bg-red-500/20 text-red-400' : 'bg-emerald-500/20 text-emerald-400'}">
                            ${user.is_blocked ? 'Bloqueado' : 'Activo'}
                        </span>
                    </td>
                    <td class="p-4">
                        <div class="flex justify-center gap-2">
                            <button onclick="openModalForEdit('${user.id}')" class="p-2 bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors" title="Editar Datos Básicos">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                            </button>
                            
                            <button onclick="openMetricsModal('${user.id}')" class="p-2 bg-emerald-600 hover:bg-emerald-700 rounded-lg transition-colors" title="Ver/Editar Métricas">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                            </button>

                            <button onclick="toggleBlockUser('${user.id}', ${user.is_blocked})" class="p-2 ${blockBtnClass} rounded-lg transition-colors">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"></path></svg>
                            </button>
                        </div>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }

        // --- LÓGICA DE MÉTRICAS ---
        async function openMetricsModal(userId) {
            document.getElementById('metrics-user-id').value = userId;
            document.getElementById('metrics-form').reset();
            document.getElementById('metrics-modal').classList.remove('hidden');
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/metrics/${userId}`);
                const data = await response.json();
                
                if (data.success && data.metrics) {
                    const m = data.metrics;
                    Object.keys(m).forEach(key => {
                        const input = document.getElementById(`field-${key}`);
                        if (input) input.value = m[key];
                    });
                }
            } catch (e) { console.error("Error al cargar métricas preexistentes"); }
        }

        function closeMetricsModal() {
            document.getElementById('metrics-modal').classList.add('hidden');
        }

        document.getElementById('metrics-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userId = document.getElementById('metrics-user-id').value;
            const formData = new FormData(e.target);
            const data = {};
            
            // Recoger todos los campos field-xxx
            const inputs = e.target.querySelectorAll('.metrics-input');
            inputs.forEach(input => {
                const key = input.id.replace('field-', '');
                data[key] = input.value;
            });

            try {
                const response = await fetch(`${API_BASE_URL}/api/metrics/${userId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const res = await response.json();
                if (res.success) {
                    alert("¡Métricas actualizadas!");
                    closeMetricsModal();
                }
            } catch (err) { alert("Error al guardar."); }
        });

        // --- LÓGICA DE USUARIOS (RECREADA) ---
        function filterUsersTable(searchTerm) {
            const term = searchTerm.toLowerCase();
            const filtered = allUsers.filter(u => 
                u.name.toLowerCase().includes(term) || 
                u.last_name.toLowerCase().includes(term) || 
                u.email.toLowerCase().includes(term)
            );
            renderUsers(filtered);
        }

        async function toggleBlockUser(userId, currentState) {
            if (!confirm(`¿Desea ${currentState ? 'desbloquear' : 'bloquear'} a este usuario?`)) return;
            try {
                const response = await fetch(`${API_BASE_URL}/api/users/${userId}/block`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ is_blocked: !currentState })
                });
                const data = await response.json();
                if (data.success) fetchAllUsers();
            } catch (e) { alert("Error al cambiar estado."); }
        }

        function openModalForCreate() {
            document.getElementById('modal-title').textContent = 'NUEVO USUARIO';
            document.getElementById('user-id').value = '';
            document.getElementById('user-form').reset();
            document.getElementById('user-modal').classList.remove('hidden');
        }

        function openModalForEdit(userId) {
            const user = allUsers.find(u => u.id === userId);
            if (!user) return;
            document.getElementById('modal-title').textContent = 'EDITAR PERFIL';
            document.getElementById('user-id').value = user.id;
            document.getElementById('user-name').value = user.name;
            document.getElementById('user-last-name').value = user.last_name;
            document.getElementById('user-email').value = user.email;
            document.getElementById('user-ci').value = user.ci || '';
            document.getElementById('user-modal').classList.remove('hidden');
        }

        document.getElementById('user-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('user-id').value;
            const userData = {
                name: document.getElementById('user-name').value,
                last_name: document.getElementById('user-last-name').value,
                email: document.getElementById('user-email').value,
                ci: document.getElementById('user-ci').value
            };

            const url = id ? `${API_BASE_URL}/api/users/${id}` : `${API_BASE_URL}/api/users`;
            const method = id ? 'PUT' : 'POST';

            try {
                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
                if ((await res.json()).success) {
                    document.getElementById('user-modal').classList.add('hidden');
                    fetchAllUsers();
                }
            } catch (err) { alert("Error al procesar usuario."); }
        });

        // --- FORMATEO DE CI ---
        document.getElementById('user-ci').addEventListener('input', function(e) {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 8) v = v.slice(0, 8);
            let f = "";
            if (v.length > 0) {
                if (v.length <= 2) f = v;
                else if (v.length <= 5) f = v.slice(0, v.length - 3) + '.' + v.slice(v.length - 3);
                else f = v.slice(0, v.length - 6) + '.' + v.slice(v.length - 6, v.length - 3) + '.' + v.slice(v.length - 3);
            }
            e.target.value = f;
        });

        window.onload = () => {
            fetchAllUsers();
            document.getElementById('back-btn').onclick = () => window.location.href = 'administration.html';
            document.getElementById('add-user-btn').onclick = openModalForCreate;
            document.getElementById('close-modal-btn').onclick = () => document.getElementById('user-modal').classList.add('hidden');
            document.getElementById('user-search-input').oninput = (e) => filterUsersTable(e.target.value);
        };
    </script>
</body>
</html>
